<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SmartRoute Algo Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    h2   { color: #4ec9b0; }
    pre  { background: #2d2d2d; padding: 12px; border-radius: 6px; overflow-x: auto; }
    .pass { color: #4ec9b0; } /* green  */
    .fail { color: #f44747; } /* red    */
    .label{ color: #9cdcfe; } /* blue   */
    button { background: #0d6efd; color: #fff; border: none; padding: 8px 16px;
             border-radius: 4px; cursor: pointer; margin: 4px 2px; font-size: 13px; }
    button:hover { background: #0b5ed7; }
    #output { margin-top: 16px; }
  </style>
</head>
<body>

<h2>SmartRoute Algorithm Test Harness</h2>
<p style="color:#888">Runs SmartRouteAlgo in isolation — no Geotab required.</p>

<button onclick="runAll()">Run All Tests</button>
<button onclick="runCustom()">Run Custom Input</button>
<button onclick="clearOutput()">Clear</button>

<div id="output"></div>

<script src="smartroute-algo.js"></script>
<script>
  /* ── synthetic test data ─────────────────────────────────────────── */

  var DEPOT = { lat: 43.6532, lng: -79.3832 }; /* Toronto downtown    */

  var BINS_30 = [
    { id: 'b01', name: 'Union Station',       lat: 43.6453, lng: -79.3806, fillLevel: 85 },
    { id: 'b02', name: 'Harbourfront',        lat: 43.6388, lng: -79.3816, fillLevel: 42 },
    { id: 'b03', name: 'Rogers Centre',       lat: 43.6414, lng: -79.3894, fillLevel: 92 },
    { id: 'b04', name: 'CN Tower',            lat: 43.6426, lng: -79.3871, fillLevel: 28 },
    { id: 'b05', name: 'Financial District',  lat: 43.6479, lng: -79.3780, fillLevel: 67 },
    { id: 'b06', name: 'St Lawrence Market',  lat: 43.6487, lng: -79.3715, fillLevel: 15 },
    { id: 'b07', name: 'Distillery District', lat: 43.6503, lng: -79.3597, fillLevel: 78 },
    { id: 'b08', name: 'Kensington Market',   lat: 43.6544, lng: -79.4007, fillLevel: 55 },
    { id: 'b09', name: 'Chinatown',           lat: 43.6529, lng: -79.3974, fillLevel: 91 },
    { id: 'b10', name: 'Queen West',          lat: 43.6487, lng: -79.4044, fillLevel: 33 },
    { id: 'b11', name: 'Trinity Bellwoods',   lat: 43.6470, lng: -79.4181, fillLevel: 72 },
    { id: 'b12', name: 'Liberty Village',     lat: 43.6378, lng: -79.4200, fillLevel: 8  },
    { id: 'b13', name: 'King West',           lat: 43.6447, lng: -79.3990, fillLevel: 88 },
    { id: 'b14', name: 'Spadina & King',      lat: 43.6455, lng: -79.3953, fillLevel: 61 },
    { id: 'b15', name: 'Metro Hall',          lat: 43.6461, lng: -79.3905, fillLevel: 45 },
    { id: 'b16', name: 'Nathan Phillips Sq',  lat: 43.6532, lng: -79.3832, fillLevel: 95 },
    { id: 'b17', name: 'Eaton Centre',        lat: 43.6544, lng: -79.3807, fillLevel: 22 },
    { id: 'b18', name: 'Old City Hall',       lat: 43.6529, lng: -79.3845, fillLevel: 76 },
    { id: 'b19', name: 'Queen & Bay',         lat: 43.6507, lng: -79.3812, fillLevel: 54 },
    { id: 'b20', name: 'Bay & Bloor',         lat: 43.6700, lng: -79.3878, fillLevel: 39 },
    { id: 'b21', name: 'Yorkville',           lat: 43.6717, lng: -79.3939, fillLevel: 83 },
    { id: 'b22', name: 'Annex',               lat: 43.6688, lng: -79.4062, fillLevel: 12 },
    { id: 'b23', name: 'Bloor & Spadina',     lat: 43.6648, lng: -79.4014, fillLevel: 69 },
    { id: 'b24', name: 'Christie Pits',       lat: 43.6645, lng: -79.4176, fillLevel: 97 },
    { id: 'b25', name: 'Dufferin Grove',      lat: 43.6516, lng: -79.4326, fillLevel: 51 },
    { id: 'b26', name: 'Roncesvalles',        lat: 43.6480, lng: -79.4442, fillLevel: 36 },
    { id: 'b27', name: 'High Park',           lat: 43.6465, lng: -79.4637, fillLevel: 74 },
    { id: 'b28', name: 'Parkdale',            lat: 43.6443, lng: -79.4373, fillLevel: 19 },
    { id: 'b29', name: 'Queen & Roncesvalles',lat: 43.6432, lng: -79.4463, fillLevel: 87 },
    { id: 'b30', name: 'Sunnyside',           lat: 43.6373, lng: -79.4503, fillLevel: 63 }
  ];

  /* ── output helpers ─────────────────────────────────────────────── */

  function out(html) {
    document.getElementById('output').innerHTML += html;
  }

  function clearOutput() {
    document.getElementById('output').innerHTML = '';
  }

  function pass(msg) { out('<div class="pass">✓ ' + msg + '</div>'); }
  function fail(msg) { out('<div class="fail">✗ ' + msg + '</div>'); }
  function label(msg){ out('<h3 class="label">' + msg + '</h3>'); }

  function assert(condition, passMsg, failMsg) {
    if (condition) pass(passMsg); else fail(failMsg);
  }

  function showResults(results) {
    out('<pre>' + JSON.stringify({
      stopsToCollect : results.optimizedOrder.length,
      stopsSkipped   : results.skippedBins.length,
      vehicleRoutes  : results.vehicleRoutes.length,
      savings        : results.savings
    }, null, 2) + '</pre>');
  }

  /* ── tests ─────────────────────────────────────────────────────── */

  function testBasicSingleVehicle() {
    label('Test 1: Basic single-vehicle, threshold 70%');
    var results = SmartRouteAlgo.run(BINS_30, DEPOT, { threshold: 70 });

    var expectedCollect = BINS_30.filter(function(b){ return b.fillLevel >= 70; }).length;
    var expectedSkip    = BINS_30.length - expectedCollect;

    assert(results.optimizedOrder.length === expectedCollect,
      'Correct number of stops collected (' + expectedCollect + ')',
      'Wrong stops collected: got ' + results.optimizedOrder.length + ', expected ' + expectedCollect);

    assert(results.skippedBins.length === expectedSkip,
      'Correct number skipped (' + expectedSkip + ')',
      'Wrong skipped: got ' + results.skippedBins.length + ', expected ' + expectedSkip);

    assert(results.vehicleRoutes.length === 1,
      'Single vehicle route returned',
      'Expected 1 vehicle route, got ' + results.vehicleRoutes.length);

    assert(results.savings.stopsReduced === expectedSkip,
      'savings.stopsReduced matches skipped count',
      'savings.stopsReduced mismatch');

    assert(results.savings.kmSaved >= 0,
      'kmSaved is non-negative (' + results.savings.kmSaved.toFixed(2) + ' km)',
      'kmSaved is negative');

    assert(results.originalPoints.length > 1,
      'originalPoints array populated (' + results.originalPoints.length + ' points)',
      'originalPoints is empty');

    showResults(results);
  }

  function testAllBinsSkipped() {
    label('Test 2: All bins below threshold (threshold 100%)');
    var results = SmartRouteAlgo.run(BINS_30, DEPOT, { threshold: 100 });

    assert(results.optimizedOrder.length === 0,
      'No stops to collect',
      'Expected 0 stops, got ' + results.optimizedOrder.length);

    assert(results.skippedBins.length === BINS_30.length,
      'All ' + BINS_30.length + ' bins skipped',
      'Expected all bins skipped');

    assert(results.vehicleRoutes.length === 0,
      'No vehicle routes generated',
      'Expected 0 routes, got ' + results.vehicleRoutes.length);

    showResults(results);
  }

  function testAllBinsCollected() {
    label('Test 3: All bins above threshold (threshold 0%)');
    var results = SmartRouteAlgo.run(BINS_30, DEPOT, { threshold: 0 });

    assert(results.optimizedOrder.length === BINS_30.length,
      'All ' + BINS_30.length + ' bins collected',
      'Expected all bins collected, got ' + results.optimizedOrder.length);

    assert(results.skippedBins.length === 0,
      'No bins skipped',
      'Expected 0 skipped, got ' + results.skippedBins.length);

    showResults(results);
  }

  function testMultiVehicle() {
    label('Test 4: Multi-vehicle (2 vehicles)');
    var vehicles = [
      { latitude: 43.6453, longitude: -79.3806 }, /* south  */
      { latitude: 43.6700, longitude: -79.4062 }  /* north  */
    ];
    var results = SmartRouteAlgo.run(BINS_30, DEPOT, { threshold: 50, vehicles: vehicles });

    assert(results.vehicleRoutes.length > 0,
      'Vehicle routes generated (' + results.vehicleRoutes.length + ')',
      'No vehicle routes returned');

    assert(results.optimizedOrder.length > 0,
      'optimizedOrder populated (' + results.optimizedOrder.length + ' stops)',
      'optimizedOrder is empty');

    showResults(results);
  }

  function testOnCompleteCallback() {
    label('Test 5: onComplete callback fires');
    var fired = false;
    SmartRouteAlgo.onComplete = function(results) {
      fired = true;
      assert(typeof results === 'object', 'results object passed to onComplete', 'no results');
    };
    SmartRouteAlgo.run(BINS_30, DEPOT, { threshold: 70 });
    assert(fired, 'onComplete callback was called', 'onComplete was NOT called');
    SmartRouteAlgo.onComplete = null; /* reset */
  }

  function testResultShape() {
    label('Test 6: Result object has all required fields');
    var results = SmartRouteAlgo.run(BINS_30, DEPOT, { threshold: 60 });

    var fields = ['optimizedOrder','skippedBins','vehicleRoutes','originalPoints','savings'];
    fields.forEach(function(f) {
      assert(results[f] !== undefined, 'results.' + f + ' present', 'results.' + f + ' MISSING');
    });

    var savingsFields = ['stopsReduced','kmSaved','fuelSavedL','co2AvoidedKg'];
    savingsFields.forEach(function(f) {
      assert(results.savings[f] !== undefined,
        'results.savings.' + f + ' present',
        'results.savings.' + f + ' MISSING');
    });
  }

  function testFuelCO2Math() {
    label('Test 7: Fuel and CO2 values are consistent with kmSaved');
    var results = SmartRouteAlgo.run(BINS_30, DEPOT, { threshold: 70 });
    var s = results.savings;
    var expectedFuel = s.kmSaved * 0.3;
    var expectedCO2  = expectedFuel * 2.68;

    assert(Math.abs(s.fuelSavedL   - expectedFuel) < 0.001,
      'fuelSavedL = kmSaved × 0.3  (' + s.fuelSavedL.toFixed(3) + ' L)',
      'fuelSavedL calculation wrong');

    assert(Math.abs(s.co2AvoidedKg - expectedCO2)  < 0.001,
      'co2AvoidedKg = fuel × 2.68  (' + s.co2AvoidedKg.toFixed(3) + ' kg)',
      'co2AvoidedKg calculation wrong');
  }

  function testPredict() {
    label('Test 8: predict() returns one entry per bin');
    var predictions = SmartRouteAlgo.predict([], BINS_30);

    assert(predictions.length === BINS_30.length,
      'predict() returns ' + predictions.length + ' entries (one per bin)',
      'predict() length mismatch');

    var fields = ['binId','predictedFullDate','fillRatePerDay','recommendedCollectionDays','confidence'];
    fields.forEach(function(f) {
      assert(predictions[0][f] !== undefined,
        'predictions[0].' + f + ' present',
        'predictions[0].' + f + ' MISSING');
    });
  }

  /* ── run all ─────────────────────────────────────────────────────── */

  function runAll() {
    clearOutput();
    out('<h2 style="color:#4ec9b0">Running all tests…</h2>');
    try {
      testBasicSingleVehicle();
      testAllBinsSkipped();
      testAllBinsCollected();
      testMultiVehicle();
      testOnCompleteCallback();
      testResultShape();
      testFuelCO2Math();
      testPredict();
      out('<h3 style="color:#4ec9b0;margin-top:20px;">Done.</h3>');
    } catch (e) {
      out('<div class="fail">UNCAUGHT ERROR: ' + e.message + '</div>');
      console.error(e);
    }
  }

  /* ── custom input ────────────────────────────────────────────────── */

  function runCustom() {
    clearOutput();
    label('Custom run — threshold 65%, single vehicle');
    var results = SmartRouteAlgo.run(BINS_30, DEPOT, { threshold: 65 });
    out('<pre>Full results:\n' + JSON.stringify(results, null, 2) + '</pre>');
  }
</script>
</body>
</html>
